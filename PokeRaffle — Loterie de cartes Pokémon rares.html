<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>PokeRaffle — Loterie de cartes Pokémon rares</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #ffffff;
      --bg2: #f5f5f3;
      --bg3: #efefec;
      --text: #1a1a18;
      --text2: #6b6b67;
      --text3: #9a9a96;
      --border: rgba(0,0,0,0.12);
      --border2: rgba(0,0,0,0.22);
      --radius: 8px;
      --radius-lg: 12px;
      --gold: #BA7517;
      --gold-bg: #FAEEDA;
      --gold-light: #FAC775;
      --green: #0F6E56;
      --green-bg: #E1F5EE;
      --red: #A32D2D;
      --red-bg: #FCEBEB;
    }

    @media (prefers-color-scheme: dark) {
      :root {
        --bg: #1c1c1a;
        --bg2: #252523;
        --bg3: #2e2e2b;
        --text: #e8e8e4;
        --text2: #9a9a96;
        --text3: #6b6b67;
        --border: rgba(255,255,255,0.1);
        --border2: rgba(255,255,255,0.2);
      }
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: var(--bg3);
      color: var(--text);
      min-height: 100vh;
      font-size: 15px;
      line-height: 1.5;
    }

    .container {
      max-width: 960px;
      margin: 0 auto;
      padding: 0 20px;
    }

    /* NAV */
    header {
      background: var(--bg);
      border-bottom: 0.5px solid var(--border);
      position: sticky;
      top: 0;
      z-index: 100;
    }

    .nav {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 14px 0;
    }

    .logo {
      font-size: 20px;
      font-weight: 600;
      color: var(--text);
      text-decoration: none;
      letter-spacing: -0.3px;
    }

    .logo span { color: var(--gold); }

    .nav-tabs { display: flex; gap: 4px; }

    .tab {
      padding: 7px 16px;
      border-radius: var(--radius);
      font-size: 13px;
      cursor: pointer;
      border: none;
      background: transparent;
      color: var(--text2);
      font-family: inherit;
      transition: background .15s, color .15s;
    }

    .tab:hover { background: var(--bg2); color: var(--text); }
    .tab.active { background: var(--bg2); color: var(--text); font-weight: 500; }

    /* MAIN */
    main { padding: 28px 0 60px; }

    .section { display: none; }
    .section.active { display: block; }

    /* STATS */
    .stats-bar {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
      margin-bottom: 24px;
    }

    .stat {
      background: var(--bg);
      border: 0.5px solid var(--border);
      border-radius: var(--radius-lg);
      padding: 14px 16px;
    }

    .stat .s-label { font-size: 11px; color: var(--text2); margin-bottom: 4px; text-transform: uppercase; letter-spacing: .04em; }
    .stat .s-val { font-size: 24px; font-weight: 500; }

    /* FILTERS */
    .rarity-filter {
      display: flex;
      gap: 6px;
      margin-bottom: 20px;
      flex-wrap: wrap;
    }

    .pill {
      padding: 5px 14px;
      border-radius: 20px;
      font-size: 12px;
      border: 0.5px solid var(--border2);
      cursor: pointer;
      background: transparent;
      color: var(--text2);
      font-family: inherit;
      transition: all .15s;
    }

    .pill:hover { border-color: var(--text); color: var(--text); }
    .pill.active { background: var(--text); color: var(--bg); border-color: var(--text); }

    /* CARDS GRID */
    .cards-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(210px, 1fr));
      gap: 14px;
    }

    .lot-card {
      background: var(--bg);
      border: 0.5px solid var(--border);
      border-radius: var(--radius-lg);
      overflow: hidden;
      transition: border-color .15s, transform .15s;
    }

    .lot-card:hover { border-color: var(--border2); transform: translateY(-2px); }
    .lot-card.holo { border-color: var(--gold-light); }

    .card-banner {
      height: 120px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 58px;
      position: relative;
    }

    .rarity-badge {
      position: absolute;
      top: 8px;
      right: 8px;
      font-size: 10px;
      font-weight: 600;
      padding: 2px 7px;
      border-radius: 4px;
    }

    .rb-secret { background: #EEEDFE; color: #3C3489; }
    .rb-ultra  { background: #FAEEDA; color: #633806; }
    .rb-holo   { background: #E6F1FB; color: #0C447C; }
    .rb-ex     { background: #FAECE7; color: #712B13; }

    .card-body { padding: 14px; }
    .card-body h3 { font-size: 14px; font-weight: 600; margin-bottom: 2px; }
    .card-body .set { font-size: 11px; color: var(--text2); margin-bottom: 10px; }
    .raw-price { font-size: 11px; color: var(--text2); margin-bottom: 6px; }
    .raw-price strong { color: var(--text); }

    .prog-wrap { height: 5px; background: var(--bg2); border-radius: 3px; margin: 8px 0 4px; }
    .prog-bar  { height: 5px; border-radius: 3px; transition: width .4s; }

    .slots-info {
      display: flex;
      justify-content: space-between;
      font-size: 11px;
      color: var(--text2);
      margin-bottom: 12px;
    }

    .t-price { font-size: 18px; font-weight: 600; }
    .t-price span { font-size: 12px; font-weight: 400; color: var(--text2); }
    .t-val { font-size: 11px; color: var(--text2); margin-top: 2px; }

    .btn-ticket {
      width: 100%;
      margin-top: 12px;
      padding: 10px;
      font-size: 13px;
      font-weight: 600;
      border-radius: var(--radius);
      border: none;
      cursor: pointer;
      background: var(--text);
      color: var(--bg);
      font-family: inherit;
      transition: opacity .15s;
    }

    .btn-ticket:hover { opacity: .85; }

    .full-badge {
      text-align: center;
      font-size: 12px;
      padding: 9px;
      background: var(--bg2);
      border-radius: var(--radius);
      color: var(--text2);
      margin-top: 12px;
    }

    .empty-state {
      grid-column: 1/-1;
      text-align: center;
      padding: 48px;
      color: var(--text2);
      font-size: 14px;
    }

    /* ADMIN PANEL */
    .admin-wrap {
      max-width: 560px;
    }

    .admin-wrap h2 {
      font-size: 17px;
      font-weight: 600;
      margin-bottom: 20px;
    }

    .panel {
      background: var(--bg);
      border: 0.5px solid var(--border);
      border-radius: var(--radius-lg);
      padding: 24px;
      margin-bottom: 16px;
    }

    .field { margin-bottom: 14px; }
    .field label { display: block; font-size: 12px; color: var(--text2); margin-bottom: 5px; }

    .field input,
    .field select {
      width: 100%;
      padding: 9px 12px;
      font-size: 14px;
      font-family: inherit;
      border: 0.5px solid var(--border2);
      border-radius: var(--radius);
      background: var(--bg);
      color: var(--text);
      outline: none;
      transition: border-color .15s;
    }

    .field input:focus,
    .field select:focus { border-color: var(--text); }

    .field input[type="range"] {
      padding: 0;
      border: none;
      background: transparent;
      cursor: pointer;
    }

    .grid2 { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }

    .preview-box {
      background: var(--bg2);
      border-radius: var(--radius);
      padding: 14px;
      margin: 14px 0;
      font-size: 13px;
    }

    .preview-row {
      display: flex;
      justify-content: space-between;
      padding: 5px 0;
      border-bottom: 0.5px solid var(--border);
    }

    .preview-row:last-child { border: none; font-weight: 600; }
    .preview-row .label { color: var(--text2); }
    .good { color: var(--green); }
    .bad  { color: var(--red); }

    .alert {
      padding: 10px 14px;
      border-radius: var(--radius);
      font-size: 12px;
      margin-bottom: 12px;
    }

    .alert.good { background: var(--green-bg); color: #085041; }
    .alert.warn { background: var(--gold-bg); color: #633806; }
    .alert.bad  { background: var(--red-bg); color: var(--red); }

    .btn-publish {
      width: 100%;
      padding: 12px;
      font-size: 14px;
      font-weight: 600;
      border-radius: var(--radius);
      border: none;
      cursor: pointer;
      background: var(--text);
      color: var(--bg);
      font-family: inherit;
      transition: opacity .15s;
    }

    .btn-publish:hover { opacity: .85; }

    /* FOOTER */
    footer {
      text-align: center;
      padding: 24px 0;
      font-size: 12px;
      color: var(--text3);
      border-top: 0.5px solid var(--border);
    }

    @media (max-width: 500px) {
      .stats-bar { grid-template-columns: 1fr 1fr; }
      .grid2 { grid-template-columns: 1fr; }
      .cards-grid { grid-template-columns: 1fr 1fr; }
      .logo { font-size: 17px; }
    }
  </style>
</head>
<body>

<header>
  <div class="container">
    <nav class="nav">
      <a class="logo" href="#">Poke<span>Raffle</span></a>
      <div class="nav-tabs">
        <button class="tab active" onclick="showTab('vitrine', this)">Vitrine</button>
        <button class="tab" onclick="showTab('admin', this)">+ Ajouter</button>
      </div>
    </nav>
  </div>
</header>

<main>
  <div class="container">

    <!-- VITRINE -->
    <div id="vitrine" class="section active">
      <div class="stats-bar" id="stats-bar"></div>
      <div class="rarity-filter">
        <button class="pill active" onclick="filterCards('all', this)">Toutes</button>
        <button class="pill" onclick="filterCards('secret', this)">Secret Rare</button>
        <button class="pill" onclick="filterCards('ultra', this)">Ultra Rare</button>
        <button class="pill" onclick="filterCards('holo', this)">Holo Rare</button>
        <button class="pill" onclick="filterCards('ex', this)">EX / GX / V</button>
      </div>
      <div class="cards-grid" id="cards-grid"></div>
    </div>

    <!-- ADMIN -->
    <div id="admin" class="section">
      <div class="admin-wrap">
        <div class="panel">
          <h2>Ajouter une carte en loterie</h2>
          <div class="grid2">
            <div class="field">
              <label>Nom de la carte</label>
              <input type="text" id="a-name" placeholder="ex: Dracaufeu VMAX" oninput="previewCalc()">
            </div>
            <div class="field">
              <label>Extension / Set</label>
              <input type="text" id="a-set" placeholder="ex: Épée & Bouclier" oninput="previewCalc()">
            </div>
          </div>
          <div class="grid2">
            <div class="field">
              <label>Rareté</label>
              <select id="a-rarity" onchange="previewCalc()">
                <option value="secret">Secret Rare</option>
                <option value="ultra">Ultra Rare</option>
                <option value="holo">Holo Rare</option>
                <option value="ex">EX / GX / V</option>
              </select>
            </div>
            <div class="field">
              <label>Emoji / icône</label>
              <input type="text" id="a-emoji" placeholder="🔥" value="✨" oninput="previewCalc()">
            </div>
          </div>
          <div class="grid2">
            <div class="field">
              <label>Prix RAW de la carte (€)</label>
              <input type="number" id="a-raw" value="150" min="50" step="5" oninput="previewCalc()">
            </div>
            <div class="field">
              <label>Frais d'envoi (€)</label>
              <input type="number" id="a-ship" value="8" min="0" step="1" oninput="previewCalc()">
            </div>
          </div>
          <div class="field">
            <label>Marge souhaitée (%)</label>
            <input type="range" id="a-margin" min="10" max="60" value="30" step="5"
              oninput="previewCalc(); document.getElementById('margin-out').textContent = this.value + '%'">
            <div style="display:flex;justify-content:space-between;font-size:11px;color:var(--text2);margin-top:4px;">
              <span>10%</span>
              <span id="margin-out" style="font-weight:600;color:var(--text);">30%</span>
              <span>60%</span>
            </div>
          </div>
          <div id="alert-box"></div>
          <div class="preview-box" id="preview-box"></div>
          <button class="btn-publish" onclick="addCard()">Publier la loterie</button>
        </div>
      </div>
    </div>

  </div>
</main>

<footer>
  <div class="container">
    PokeRaffle &mdash; Loteries de cartes Pokémon rares &mdash; Expédition soignée garantie
  </div>
</footer>

<script>
  const COMMISSION = 0.029;

  const RARITY_LABEL = { secret: 'Secret Rare', ultra: 'Ultra Rare', holo: 'Holo Rare', ex: 'EX / GX / V' };
  const RARITY_CLASS = { secret: 'rb-secret', ultra: 'rb-ultra', holo: 'rb-holo', ex: 'rb-ex' };
  const RARITY_COLOR = { secret: '#FAECE7', ultra: '#FAEEDA', holo: '#E6F1FB', ex: '#E1F5EE' };
  const RARITY_HOLO  = ['secret', 'ultra'];

  let cards = [
    { id:1, name:'Dracaufeu VMAX', set:'Épée & Bouclier — Darkness Ablaze', emoji:'🔥', rarity:'secret', raw:220, ship:8,  slots:35, ticket:9,  filled:27 },
    { id:2, name:'Mewtwo EX',      set:'XY — Évolutions',                   emoji:'🔮', rarity:'ultra',  raw:150, ship:6,  slots:28, ticket:7,  filled:14 },
    { id:3, name:'Pikachu Illustrateur', set:'Promo — 1997',                emoji:'⚡', rarity:'secret', raw:500, ship:10, slots:45, ticket:14, filled:18 },
    { id:4, name:'Lugia V Alt Art', set:'Silver Tempest',                   emoji:'🌊', rarity:'ultra',  raw:180, ship:8,  slots:30, ticket:8,  filled:30 },
    { id:5, name:'Umbreon VMAX',    set:'Évolutions Brillantes',             emoji:'🌙', rarity:'ultra',  raw:130, ship:6,  slots:25, ticket:7,  filled:11 },
    { id:6, name:'Rayquaza VMAX',   set:'Legendary Clash',                   emoji:'🐉', rarity:'ex',     raw:95,  ship:6,  slots:22, ticket:6,  filled:4  },
  ];

  let nextId = 7;
  let activeFilter = 'all';

  function calcTickets(raw, ship, marginPct) {
    const cost    = raw + ship;
    const target  = cost / (1 - marginPct / 100);
    const revenue = target / (1 - COMMISSION);
    const base    = Math.max(3, revenue / Math.round(revenue / 6));
    const ticket  = Math.ceil(base * 2) / 2;
    const slots   = Math.ceil(revenue / ticket);
    const gross   = +(ticket * slots).toFixed(2);
    const net     = +(gross * (1 - COMMISSION)).toFixed(2);
    const profit  = +(net - cost).toFixed(2);
    const margin  = Math.round((profit / gross) * 100);
    const clientVal = Math.round(((raw / slots) / ticket) * 100);
    return { ticket, slots, gross, net, profit, margin, clientVal };
  }

  function renderCards() {
    const grid = document.getElementById('cards-grid');
    const list = activeFilter === 'all' ? cards : cards.filter(c => c.rarity === activeFilter);

    if (!list.length) {
      grid.innerHTML = '<div class="empty-state">Aucune carte dans cette catégorie.</div>';
      renderStats();
      return;
    }

    grid.innerHTML = list.map(c => {
      const pct       = Math.round((c.filled / c.slots) * 100);
      const remaining = c.slots - c.filled;
      const full      = remaining <= 0;
      const barColor  = full ? '#E24B4A' : remaining <= 5 ? '#BA7517' : '#185FA5';
      const clientVal = Math.round(((c.raw / c.slots) / c.ticket) * 100);
      const holoClass = RARITY_HOLO.includes(c.rarity) ? ' holo' : '';

      return `
        <div class="lot-card${holoClass}">
          <div class="card-banner" style="background:${RARITY_COLOR[c.rarity]};">
            <span>${c.emoji}</span>
            <span class="rarity-badge ${RARITY_CLASS[c.rarity]}">${RARITY_LABEL[c.rarity]}</span>
          </div>
          <div class="card-body">
            <h3>${c.name}</h3>
            <div class="set">${c.set}</div>
            <div class="raw-price">Valeur RAW : <strong>${c.raw} €</strong></div>
            <div class="prog-wrap">
              <div class="prog-bar" style="width:${pct}%;background:${barColor};"></div>
            </div>
            <div class="slots-info">
              <span>${c.filled}/${c.slots} tickets vendus</span>
              <span>${full ? 'Complet' : remaining <= 5 ? remaining + ' restants' : pct + '%'}</span>
            </div>
            <div class="t-price">${c.ticket} € <span>/ ticket</span></div>
            <div class="t-val">Valeur perçue : ~${clientVal}% du prix RAW</div>
            ${full
              ? `<div class="full-badge">Tirage en cours...</div>`
              : `<button class="btn-ticket" onclick="buyTicket(${c.id})">Prendre un ticket</button>`
            }
          </div>
        </div>`;
    }).join('');

    renderStats();
  }

  function renderStats() {
    const active = cards.filter(c => c.filled < c.slots).length;
    document.getElementById('stats-bar').innerHTML = `
      <div class="stat"><div class="s-label">Loteries actives</div><div class="s-val">${active}</div></div>
      <div class="stat"><div class="s-label">Cartes en vitrine</div><div class="s-val">${cards.length}</div></div>
    `;
  }

  function buyTicket(id) {
    const c = cards.find(x => x.id === id);
    if (!c || c.filled >= c.slots) return;
    c.filled++;
    renderCards();
  }

  function filterCards(rarity, btn) {
    activeFilter = rarity;
    document.querySelectorAll('.pill').forEach(p => p.classList.remove('active'));
    btn.classList.add('active');
    renderCards();
  }

  function showTab(id, btn) {
    document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
    document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
    document.getElementById(id).classList.add('active');
    btn.classList.add('active');
    if (id === 'admin') previewCalc();
  }

  function previewCalc() {
    const raw    = parseFloat(document.getElementById('a-raw').value) || 100;
    const ship   = parseFloat(document.getElementById('a-ship').value) || 8;
    const margin = parseInt(document.getElementById('a-margin').value) || 30;
    const r      = calcTickets(raw, ship, margin);
    const fees   = +(r.gross - r.net).toFixed(2);

    const cls = margin >= 25 ? 'good' : margin >= 15 ? 'warn' : 'bad';
    const msg = margin >= 25
      ? `Bonne marge — tu récupères ~${r.profit.toFixed(0)} € net.`
      : margin >= 15
      ? `Marge correcte mais serrée. Augmente le slider pour plus de confort.`
      : `Marge trop faible — risque si peu de tickets vendus.`;

    document.getElementById('alert-box').innerHTML = `<div class="alert ${cls}">${msg}</div>`;
    document.getElementById('preview-box').innerHTML = `
      <div class="preview-row"><span class="label">Prix du ticket</span><span>${r.ticket} €</span></div>
      <div class="preview-row"><span class="label">Nombre de tickets</span><span>${r.slots}</span></div>
      <div class="preview-row"><span class="label">Revenus bruts</span><span>${r.gross.toFixed(2)} €</span></div>
      <div class="preview-row"><span class="label">Commission paiement (2.9%)</span><span class="bad">− ${fees.toFixed(2)} €</span></div>
      <div class="preview-row"><span class="label">Valeur carte + envoi</span><span class="bad">− ${(raw + ship).toFixed(2)} €</span></div>
      <div class="preview-row"><span class="label">Bénéfice net</span><span class="${r.profit >= 0 ? 'good' : 'bad'}">${r.profit >= 0 ? '+' : ''}${r.profit.toFixed(2)} €</span></div>
    `;
  }

  function addCard() {
    const name = document.getElementById('a-name').value.trim();
    if (!name) { alert('Donne un nom à la carte.'); return; }
    const set    = document.getElementById('a-set').value.trim() || '—';
    const raw    = parseFloat(document.getElementById('a-raw').value) || 100;
    const ship   = parseFloat(document.getElementById('a-ship').value) || 8;
    const margin = parseInt(document.getElementById('a-margin').value) || 30;
    const rarity = document.getElementById('a-rarity').value;
    const emoji  = document.getElementById('a-emoji').value || '✨';
    const r      = calcTickets(raw, ship, margin);

    cards.unshift({ id: nextId++, name, set, emoji, rarity, raw, ship, slots: r.slots, ticket: r.ticket, filled: 0 });

    document.getElementById('a-name').value = '';
    document.getElementById('a-set').value  = '';
    activeFilter = 'all';
    document.querySelectorAll('.pill').forEach((p, i) => p.classList.toggle('active', i === 0));
    showTab('vitrine', document.querySelectorAll('.tab')[0]);
    renderCards();
  }

  renderCards();
  previewCalc();
</script>

</body>
</html>
